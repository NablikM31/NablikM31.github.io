<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nablik - Inicio</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@900&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* ================= VARIABLES Y RESET ================= */
        :root {
            --bg-color: #0a0a0a;
            --card-bg: #1a1a1a;
            --text-main: #ffffff;
            --text-muted: #888888;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* ================= TIPOGRAFÍA ================= */
        h1, h2, h3 {
            font-family: 'Montserrat', sans-serif;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -1px;
        }

        /* ================= HEADER ================= */
        header {
            text-align: center;
            padding: 4rem 1rem 2rem 1rem;
            animation: fadeInDown 0.8s ease-out forwards;
        }

        header h1 {
            font-size: clamp(3rem, 8vw, 6rem); /* Texto grande y adaptable */
            color: var(--text-main);
            text-shadow: 2px 4px 10px rgba(0,0,0,0.5);
        }

        /* ================= CUERPO / GRID DE TARJETAS ================= */
        main {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            padding: 2rem;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
        }

        /* ================= DISEÑO DE CAJAS (CARDS) ================= */
        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #333;
            /* Animación inicial "empuje" */
            opacity: 0;
            transform: translateY(30px);
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
            /* Transición fluida para el hover */
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.4s ease;
        }

        /* Retrasos escalonados para que aparezcan una tras otra */
        .card:nth-child(1) { animation-delay: 0.1s; }
        .card:nth-child(2) { animation-delay: 0.3s; }
        .card:nth-child(3) { animation-delay: 0.5s; }

        /* Efecto al pasar el mouse (Agrandar y proyectar sombra) */
        .card:hover {
            transform: scale(1.05) translateY(-8px);
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.05);
            border-color: #555;
        }

        .card-image {
            width: 100%;
            height: 200px;
            background-color: #2a2a2a;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
            /* Aquí irá la etiqueta <img> cuando tengas tus portadas */
            position: relative;
            overflow: hidden;
        }

        .card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .card:hover .card-image img {
            transform: scale(1.1); /* Ligero zoom a la imagen en hover */
        }

        .card-content {
            padding: 1.5rem;
            text-align: center;
        }

        .card-content h2 {
            font-size: 1.5rem;
            color: var(--text-main);
        }

        /* ================= FOOTER ================= */
        footer {
            text-align: center;
            padding: 2rem;
            margin-top: 3rem;
            border-top: 1px solid #222;
            animation: fadeIn 1s ease 1s forwards;
            opacity: 0;
        }

        .social-links {
            margin-bottom: 1rem;
            display: flex;
            justify-content: center;
            gap: 1.5rem;
        }

        .social-links a {
            color: var(--text-muted);
            font-size: 1.5rem;
            transition: color 0.3s ease, transform 0.3s ease;
        }

        .social-links a:hover {
            color: var(--text-main);
            transform: translateY(-3px);
        }

        .copyright {
            color: var(--text-muted);
            font-size: 0.85rem;
        }

        /* ================= KEYFRAMES (ANIMACIONES) ================= */
        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <header>
        <h1>NABLIK</h1>
    </header>

    <main>
        <div class="card">
            <div class="card-image">
                <span>[Espacio para Imagen]</span>
            </div>
            <div class="card-content">
                <h2>notas de fisica</h2>
            </div>
        </div>

        <div class="card">
            <div class="card-image">
                <span>[Espacio para Imagen]</span>
            </div>
            <div class="card-content">
                <h2>Notas de Matematicas</h2>
            </div>
        </div>

        <div class="card">
            <div class="card-image">
                <span>[Espacio para Imagen]</span>
            </div>
            <div class="card-content">
                <h2>quien soy yo? xddddd</h2>
            </div>
        </div>
    </main>

    <footer>
        <div class="social-links">
            <a href="#" target="_blank"><i class="fa-brands fa-instagram"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-facebook-f"></i></a>
            <a href="#" target="_blank"><i class="fa-brands fa-github"></i></a>
        </div>
        <div class="copyright">
            &copy; 2026 Nablik. Todos los derechos reservados.
        </div>
    </footer>

</body>
</html>
